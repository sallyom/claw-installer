# OpenShift only -- SA for the oauth-proxy sidecar.
# The oauth-redirectreference annotation tells OpenShift to allow
# OAuth callbacks to the Route named "openclaw" in this namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw-oauth-proxy
  namespace: alice-myagent-openclaw
  labels:
    app: openclaw
  annotations:
    serviceaccounts.openshift.io/oauth-redirectreference.primary: >-
      {"kind":"OAuthRedirectReference","apiVersion":"v1",
       "reference":{"kind":"Route","name":"openclaw"}}
