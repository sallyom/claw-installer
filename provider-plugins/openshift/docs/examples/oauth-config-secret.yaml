# OpenShift only -- holds the OAuth client-secret and cookie secret.
# client-secret is a ServiceAccount token created via the TokenRequest API.
# cookie_secret is a random hex string for session cookies.
apiVersion: v1
kind: Secret
metadata:
  name: openclaw-oauth-config
  namespace: alice-myagent-openclaw
  labels:
    app: openclaw
stringData:
  client-secret: "<SA token from TokenRequest API>"
  cookie_secret: "<random 32-char hex>"
