# OpenShift only -- holds the OAuth proxy cookie secret.
# The OAuth client-secret comes from the pod's mounted ServiceAccount token.
# cookie_secret is a random hex string for session cookies.
apiVersion: v1
kind: Secret
metadata:
  name: openclaw-oauth-config
  namespace: alice-myagent-openclaw
  labels:
    app: openclaw
stringData:
  cookie_secret: "<random 32-char hex>"
