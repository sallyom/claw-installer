# Main OpenClaw configuration generated by the installer.
# Access on Kubernetes is via kubectl port-forward to localhost:18789.
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: alice-myagent-openclaw
  labels:
    app: openclaw
data:
  openclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "auth": {
          "mode": "token",
          "token": "<generated-gateway-token>"
        },
        "controlUi": {
          "allowedOrigins": [
            "http://localhost:18789"
          ]
        }
      },
      "agents": {
        "defaults": {
          "workspace": "~/.openclaw/workspace",
          "model": { "primary": "anthropic/claude-sonnet-4-6" },
          "models": {
            "anthropic/claude-sonnet-4-6": { "alias": "claude-sonnet-4-6" }
          }
        },
        "list": [
          {
            "id": "alice_myagent",
            "name": "My Agent",
            "workspace": "~/.openclaw/workspace-alice_myagent",
            "model": { "primary": "anthropic/claude-sonnet-4-6" },
            "subagents": { "allowAgents": ["*"] }
          }
        ]
      },
      "skills": {
        "load": {
          "extraDirs": ["~/.openclaw/skills"],
          "watch": true,
          "watchDebounceMs": 1000
        }
      },
      "cron": { "enabled": true }
    }
