# The OpenClaw deployment. On OpenShift, includes the oauth-proxy sidecar
# and binds the gateway to loopback. On plain Kubernetes, the oauth-proxy
# sidecar, its volumes, and the serviceAccountName are omitted, and the
# gateway binds to "lan" instead.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: alice-myagent-openclaw
  labels:
    app: openclaw
    app.kubernetes.io/managed-by: openclaw-installer
    openclaw.prefix: alice
    openclaw.agent: myagent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  # Recreate avoids deadlock with ReadWriteOnce PVC — the new pod can't
  # mount the volume until the old pod releases it.
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: openclaw
      annotations:
        # Updated on every deploy to force a pod rollout
        openclaw.io/restart-at: "2026-03-10T12:00:00.000Z"
    spec:
      # OpenShift only
      serviceAccountName: openclaw-oauth-proxy

      initContainers:
        - name: init-config
          image: registry.access.redhat.com/ubi9-minimal:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              cp /config/openclaw.json /home/node/.openclaw/openclaw.json
              chmod 644 /home/node/.openclaw/openclaw.json
              mkdir -p /home/node/.openclaw/workspace
              mkdir -p /home/node/.openclaw/skills
              mkdir -p /home/node/.openclaw/cron
              mkdir -p /home/node/.openclaw/workspace-alice_myagent
              if [ ! -f /home/node/.openclaw/workspace-alice_myagent/AGENTS.md ]; then
                cp /agents/AGENTS.md /home/node/.openclaw/workspace-alice_myagent/AGENTS.md 2>/dev/null || true
                cp /agents/agent.json /home/node/.openclaw/workspace-alice_myagent/agent.json 2>/dev/null || true
                cp /agents/SOUL.md /home/node/.openclaw/workspace-alice_myagent/SOUL.md 2>/dev/null || true
                # ... additional workspace files
              fi
              # GID 0 permissions so any UID can access (required for OpenShift
              # random UID assignment under restricted-v2 SCC)
              chgrp -R 0 /home/node/.openclaw 2>/dev/null || true
              chmod -R g=u /home/node/.openclaw 2>/dev/null || true
              echo "Config initialized"
          resources:
            requests: { memory: 64Mi, cpu: 50m }
            limits: { memory: 128Mi, cpu: 200m }
          volumeMounts:
            - name: openclaw-home
              mountPath: /home/node/.openclaw
            - name: config-template
              mountPath: /config
            - name: agent-config
              mountPath: /agents

      containers:
        # ── OpenShift only: oauth-proxy sidecar ──
        - name: oauth-proxy
          image: quay.io/openshift/origin-oauth-proxy:4.14
          args:
            - --http-address=:8443
            - --https-address=
            - --provider=openshift
            - --upstream=http://localhost:18789
            - --client-id=system:serviceaccount:alice-myagent-openclaw:openclaw-oauth-proxy
            - --client-secret-file=/etc/oauth/config/client-secret
            - --cookie-secret-file=/etc/oauth/config/cookie_secret
            - --cookie-expire=23h0m0s
            - --pass-access-token
            # user:info = any authenticated OpenShift user can access.
            # No cluster-admin needed.
            # To restrict to namespace members, use --openshift-sar instead:
            #   --scope=user:full
            #   --openshift-sar={"namespace":"alice-myagent-openclaw","resource":"pods","verb":"get"}
            # Note: --openshift-sar requires a ClusterRoleBinding granting
            # system:auth-delegator to the SA (needs cluster-admin).
            - --scope=user:info
            - --skip-auth-regex=^/(metrics|api)
          ports:
            - containerPort: 8443
              name: oauth-ui
          volumeMounts:
            - name: oauth-config
              mountPath: /etc/oauth/config
            - name: proxy-tls
              mountPath: /etc/tls/private
          livenessProbe:
            httpGet: { path: /oauth/healthz, port: oauth-ui, scheme: HTTP }
            initialDelaySeconds: 30
            periodSeconds: 5
          readinessProbe:
            httpGet: { path: /oauth/healthz, port: oauth-ui, scheme: HTTP }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { memory: 64Mi, cpu: 50m }
            limits: { memory: 128Mi, cpu: 200m }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]

        # ── OpenClaw gateway ──
        - name: gateway
          image: quay.io/aicatalyst/openclaw:latest
          imagePullPolicy: Always
          command:
            - node
            - dist/index.js
            - gateway
            - run
            # "loopback" on OpenShift (oauth-proxy fronts it),
            # "lan" on plain Kubernetes
            - --bind
            - loopback
            - --port
            - "18789"
          ports:
            - name: gateway
              containerPort: 18789
              protocol: TCP
          env:
            - name: HOME
              value: /home/node
            - name: NODE_ENV
              value: production
            - name: OPENCLAW_CONFIG_DIR
              value: /home/node/.openclaw
            - name: OPENCLAW_STATE_DIR
              value: /home/node/.openclaw
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef: { name: openclaw-secrets, key: OPENCLAW_GATEWAY_TOKEN }
            # Optional keys — only injected if present in the Secret
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef: { name: openclaw-secrets, key: ANTHROPIC_API_KEY, optional: true }
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef: { name: openclaw-secrets, key: OPENAI_API_KEY, optional: true }
            - name: GOOGLE_CLOUD_PROJECT
              valueFrom:
                secretKeyRef: { name: openclaw-secrets, key: GOOGLE_CLOUD_PROJECT, optional: true }
            - name: GOOGLE_CLOUD_LOCATION
              valueFrom:
                secretKeyRef: { name: openclaw-secrets, key: GOOGLE_CLOUD_LOCATION, optional: true }
            # Vertex AI — set when GCP SA JSON is provided
            - name: VERTEX_ENABLED
              value: "true"
            - name: VERTEX_PROVIDER
              value: anthropic
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /home/node/gcp/sa.json
          resources:
            requests: { memory: 512Mi, cpu: 250m }
            limits: { memory: 2Gi, cpu: "1000m" }
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - >-
                  require('http').get('http://127.0.0.1:18789/',r=>process.exit(r.statusCode<400?0:1)).on('error',()=>process.exit(1))
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - node
                - -e
                - >-
                  require('http').get('http://127.0.0.1:18789/',r=>process.exit(r.statusCode<400?0:1)).on('error',()=>process.exit(1))
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: openclaw-home
              mountPath: /home/node/.openclaw
            - name: tmp-volume
              mountPath: /tmp
            # Vertex AI only
            - name: gcp-sa
              mountPath: /home/node/gcp
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]

      volumes:
        - name: openclaw-home
          persistentVolumeClaim:
            claimName: openclaw-home-pvc
        - name: config-template
          configMap:
            name: openclaw-config
        - name: agent-config
          configMap:
            name: openclaw-agent
        - name: tmp-volume
          emptyDir: {}
        # Vertex AI only
        - name: gcp-sa
          secret:
            secretName: gcp-sa
        # OpenShift only
        - name: oauth-config
          secret:
            secretName: openclaw-oauth-config
        - name: proxy-tls
          secret:
            secretName: openclaw-proxy-tls
