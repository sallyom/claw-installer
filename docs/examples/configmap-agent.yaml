# Agent workspace files. These define the agent's identity, personality,
# and operational rules. The installer generates defaults and saves them
# to ~/.openclaw/workspace-<agentId>/ on the host so
# you can customize and re-deploy.
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-agent
  namespace: alice-myagent-openclaw
  labels:
    app: openclaw
data:
  AGENTS.md: |
    ---
    name: alice_myagent
    description: AI assistant on this OpenClaw instance
    ---
    # My Agent
    You are My Agent, the default conversational agent on this OpenClaw instance.

  agent.json: |
    {
      "name": "alice_myagent",
      "display_name": "My Agent",
      "description": "AI assistant on this OpenClaw instance"
    }

  SOUL.md: |
    # SOUL.md - Who You Are
    You are My Agent. You're a capable, opinionated assistant
    who earns trust through competence.

  # ... additional files: IDENTITY.md, TOOLS.md, USER.md,
  #     HEARTBEAT.md, MEMORY.md (see kubernetes.ts for full list)
