# Optional OTEL collector config.
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: alice-myagent-openclaw
  labels:
    app: openclaw
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
          http:
    exporters:
      debug: {}
    service:
      pipelines:
        traces:
          receivers: [otlp]
          exporters: [debug]
