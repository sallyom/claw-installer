# Main secret created for every deploy.
apiVersion: v1
kind: Secret
metadata:
  name: openclaw-secrets
  namespace: alice-myagent-openclaw
  labels:
    app: openclaw
stringData:
  OPENCLAW_GATEWAY_TOKEN: "<generated-gateway-token>"
  # Include whichever provider credentials you use:
  # ANTHROPIC_API_KEY: "<your-key>"
  # OPENAI_API_KEY: "<your-key>"
  # OPENAI_CODEX_AUTH_PROFILES_JSON: "<generated OpenClaw auth profile store>"
  # MODEL_ENDPOINT: "https://your-endpoint.example.com/v1"
  # TELEGRAM_BOT_TOKEN: "<your-telegram-token>"
  # GOOGLE_CLOUD_PROJECT: "<auto-extracted-from-sa-json>"
  # GOOGLE_CLOUD_LOCATION: "us-central1"
  # SSH_IDENTITY: "<private-key>"
  # SSH_CERTIFICATE: "<ssh-certificate>"
  # SSH_KNOWN_HOSTS: "<known-hosts-entries>"
  # LITELLM_MASTER_KEY: "<generated-when-using-litellm>"
---
# Optional direct Vertex credentials secret.
apiVersion: v1
kind: Secret
metadata:
  name: gcp-sa
  namespace: alice-myagent-openclaw
  labels:
    app: openclaw
stringData:
  sa.json: "<contents of your GCP service account JSON>"
