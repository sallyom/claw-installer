name: Build and Push OpenClaw Vertex Image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile.openclaw'
      - '.github/workflows/build-openclaw-vertex-image.yml'
  pull_request:
    paths:
      - 'Dockerfile.openclaw'
      - '.github/workflows/build-openclaw-vertex-image.yml'
  workflow_dispatch:

env:
  IMAGE: quay.io/aicatalyst/openclaw
  TAG: vertex-anthropic
  OPENCLAW_REPO: https://github.com/sallyom/openclaw.git
  OPENCLAW_REF: pi-vertex-testbranch

jobs:
  # PR validation: amd64 only, no push
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (amd64 only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.openclaw
          platforms: linux/amd64
          push: false
          build-args: |
            OPENCLAW_REPO=${{ env.OPENCLAW_REPO }}
            OPENCLAW_REF=${{ env.OPENCLAW_REF }}
          cache-from: type=gha,scope=vertex-amd64
          cache-to: type=gha,mode=max,scope=vertex-amd64

  # Production build: native runners per platform (no QEMU)
  build:
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            slug: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            slug: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Quay.io
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.openclaw
          platforms: ${{ matrix.platform }}
          build-args: |
            OPENCLAW_REPO=${{ env.OPENCLAW_REPO }}
            OPENCLAW_REF=${{ env.OPENCLAW_REF }}
          outputs: type=image,"name=${{ env.IMAGE }}",push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=vertex-${{ matrix.slug }}
          cache-to: type=gha,mode=max,scope=vertex-${{ matrix.slug }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Quay.io
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE}:${TAG}" \
            $(printf "${IMAGE}@sha256:%s " *)
